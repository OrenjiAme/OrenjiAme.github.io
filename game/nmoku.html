<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ｎ目並べ(仮)</title>
    <link rel="stylesheet" href="nmoku.css">
</head>
<body>
    <h1>4目並べ(コネクトフォー)</h1>
    <p class="comment">先手と後手が交互にコマを下から積み重ねて、先に縦・横・斜め(バグ修正中)どれかに4つ並べた方が勝ちです。</p>
    <div id = "turnA">先手(●)のターンです。</div>
    <div id = "turnB">後手(▲)のターンです。</div>
    <script>
        document.getElementById("turnA").style.display = "block";
        document.getElementById("turnB").style.display = "none";
        </script>
    <input type="button" value="リセット" onclick="reset()"><br>
    <h2 id="win"> </h2>
    <br>
    <table id = "game">
        <script>
            for(var i = 0; i <= 6; i++){
                document.write('<th><input type="button" value="置く！" onclick="play(' + String(i) + ')"></th>');
            }
            for(var i = 1; i <= 6; i++){
                document.write("<tr>");                
                for(var j = 1; j <= 7; j++){
                    document.write('<td><span class = "space"></span></td>');
                }
                document.write("</tr>");
            }
        </script>
    </table>
    対戦機能を追加したい...友だちと遊ぶのに使えるレベルにはしたいですね。<br>
    引き分けにするのは意外と難しいです。良かったら考えてみてください。<br>
    <script src="nmoku.js"></script>
</body>
</html>
