<html lang="ja">
<head>
<meta charset="UTF-8">
<title></title>
</head>
<body onload="draw();">
    <canvas id="canvas1" width="500" height="500"></canvas>

<form method="post" name="send_form">
<input type="text" name="field1" id="fld1" value="" />
<input type="submit" />
</form>
<script type="text/javascript">
var canvas = undefined;
function draw(){
    canvas = document.getElementById('canvas1');
    var ctx = canvas.getContext('2d');
    /* Imageオブジェクトを生成 */
    var img = new Image();
    img.onload = function() {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        ctx.textAlign="center";
        ctx.fillStyle = "black";
        ctx.font = "30px 'ＭＳ ゴシック'";
        ctx.fillText("見出しテキスト", canvas.width/2, canvas.height/2);
        fld1.value = canvas.toDataURL();
    };
    img.src = "5156.png";
}
draw();
</script>
</body>
</html>
