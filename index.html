<!DOCTYPE html>

<title>postaskit</title>
<link rel="stylesheet" href="poshe.css">
<script src="jquery-3.6.0.min.js"></script>
<link rel="icon" href="https://orenjiame.github.io/favicon.ico">

<body>
<div id="datearea"></div>
マウスでドラッグすることでタスクを並び替えれます。<br>
<details open>
	<summary>入力欄を折り畳む</summary>
	期限<input id="date" type="datetime-local">
	タイトル<input id="title" type="text" value="" size="30">
	<button onclick="regit()">登録</button><button onclick="save_cookie()">保存</button><br>
	<textarea id="text" placeholder="ここに詳細を入力してください。" rows="3"></textarea>
</details>
<details open><summary>【未割当】</summary>
	<ul class="drag-list" id="unallocated">
		<li style="border:0;list-style-type:none;">&nbsp;</li>
	</ul>
</details>
<details open><summary>【午前】</summary>
	<ul class="drag-list" id="am">
		<li style="border:0;list-style-type:none;">&nbsp;</li>
	</ul>
</details>
<details open><summary>【午後】</summary>
	<ul class="drag-list" id="pm">
		<li style="border:0;list-style-type:none;">&nbsp;</li>
	</ul>
</details>
<details open><summary>【明日以降】</summary>
	<ul class="drag-list" id="tomorrow">
		<li style="border:0;list-style-type:none;">&nbsp;</li>
	</ul>
</details>
<details open><summary>【完了】</summary>
	<ul class="drag-list" id="finished">
		<li style="border:0;list-style-type:none;">&nbsp;</li>
	</ul>
</details>
<details><summary>ゴミ箱(保存されません)<button onclick="save_cookie()">すべて削除</button></summary>
	<ul class="drag-list">
		<li style="border:0;list-style-type:none;">&nbsp;</li>
	</ul>
</details>
<br>

<input type="checkbox" id="autosave" checked="true">オートセーブ機能(実験的)<br>
<input type="checkbox" checked="true" id = "showdate">現在の日時・時刻を表示する<br>
<input type="checkbox" id = "details">詳細を常に表示する(未実装)<br>
<input type="checkbox" id = "sortbytime">時刻順に並び替える(未実装)<br>
<input type="checkbox" id = "hidedate">日付を非表示にする(未実装)<br>
保存にはブラウザのCookieを使用します。<br>
オートセーブがオフの場合、ページ更新すると保存前の状態に戻ります。

</body>
<script src="poshe.js"></script>
