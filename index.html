<body>
    <!-- The core Firebase JS SDK is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-auth.js"></script>
    <script>
        // Your web app's Firebase configuration
        var firebaseConfig = {
            apiKey: "AIzaSyB0ZAgUHK3pbpHVAZWgsh7ZDEmGhZRpxbA",
            authDomain: "connect4-3a65a.firebaseapp.com",
            projectId: "connect4-3a65a",
            storageBucket: "connect4-3a65a.appspot.com",
            messagingSenderId: "547328919927",
            appId: "1:547328919927:web:dd313688f191d84b6a7972",
            measurementId: "G-CD8CFN5ENV"
        };
        // Initialize Firebase
        var app = firebase.initializeApp(firebaseConfig);
        var db = firebase.firestore(app);
        
        function onClick() {
            db.collection("actions").add({
                x:10,
                table:JSON.stringify([[1,2,3],[2,3,4],[5,6,7]]),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        };
        db.collection("actions").orderBy("createdAt", "desc").limit(1).onSnapshot(function (querySnapshot) {
        querySnapshot.forEach(function(queryDocSnapshot) {
        var data = queryDocSnapshot.data();
        console.log(data);
    });
});
    </script>
    <button onclick="onClick()">書き込みテスト</button>
</body>
