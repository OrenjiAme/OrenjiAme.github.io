<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>データの入出力</title>
    <script src="in_out.js"></script>
</head>
<body>
    <div>表示したい場所</div>
    <form name = "location">
        <input type="checkbox" id = "hikone" checked>彦根
        <input type="checkbox" id = "naha" checked>那覇
        <input type="checkbox" id = "aba" checked>網走
    </form>
    項目<br>
    <input type="checkbox" id = "sun" value = "0" checked>日照時間
    <input type="checkbox" id = "rain" value = "1" checked>降水量
    <input type="checkbox" id = "temp" value = "2" checked>気温
    <input type="checkbox" id = "snow" value = "3" checked>積雪量<br>
    期間
    <input type="button" onclick = season(1) value="春">
    <input type="button" onclick = season(2) value="夏">
    <input type="button" onclick = season(3) value="秋">
    <input type="button" onclick = season(4) value="冬"><br>
    <input type="text" id = "first" value = "1">月～
    <input type="text" id = "end" value = "12">月<br>
    実行ボタン<br>
    <input type="button" onclick = reset() value="リセット">
    <input type="button" onclick = calc() value="計算"><br>
    結果出力エリア<br>
    <textarea rows="40" cols="40" id = "result">
計算ボタンを押してください。
    </textarea><br>
    結果をダウンロード
    <input type="button" onclick = DL() value="ダウンロード"><br>
</body>
</html>
