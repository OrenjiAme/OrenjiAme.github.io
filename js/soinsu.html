<html>
    <head>
        <title>Java scriptのテスト</title>
    </head>
    <body>
        <input type="text" id="inp">
        <input type="button" onclick="main()" value="素因数分解！"><br>
        結果↓<div id="output"></div>
        <script>
            function isMultiple(a,n){//練習5
                if (a%n == 0){return true;}
                else {return false;}
            }
            function minFactor(a){//練習6
                var i = 2;
                while (i < a){
                    if (isMultiple(a,i)){
                        return i;
                    }
                    else {i++;}
                }
                return a;
            }
            function prime_factorization(n){//素因数分解
                var ans = [];
                if (n == 1){ans.push(1);}
                while (n != 1){
                    var p = minFactor(n);
                    ans.push(p);
                    n = Math.floor(n/p);
                }
                return ans;
            }
            function main(){//ボタンクリック時
                var num = document.getElementById("inp").value;
                var result = prime_factorization(num);
                var ans = num_to_str(result,num);
                document.getElementById('output').innerHTML = ans;
            }
            function num_to_str(result,num){//結果整形用
                var str = String(num) + " = ";
                for(var i = 0;i < result.length;i++){
                    str += (String(result[i]));
                    if (i != result.length-1){str += "*";}
                }
                return str;
            }
        </script>
    </body>
</html>
