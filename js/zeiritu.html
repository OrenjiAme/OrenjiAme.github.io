<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>税率計算</title>
    <style type="text/css">
        td.obj{font-size: large;}
    </style>
    <script src="main.js"></script>
</head>
<body>
    <table border="1">
        <tbody><tr>
            <td class="obj">商品名</td>
            <td class="obj">税別金額</td>
            <td class="obj">個数</td>
            <td class="obj">税込金額</td>
        </tr>
        <tr>
            <td>商品1</td>
            <td>
                <input type="text" id="price1">円
            </td>
            <td>
                <select id="s1" onclick="amount_reload()">
                    <script>
                        for(var i = 1;i<=10;i++){
                            document.write("<option value="+i+">"+i+"</option>");
                        }
                    </script>
                </select>個
            </td>
            <td>
                <div id = "result1">？</div>円
            </td>
        </tr>
        <tr>
            <td>商品2</td>
            <td>
                <input type="text" id="price2">円
            </td>
            <td>
                <select id="s2" onclick="amount_reload()">
                    <script>
                        for(var i = 1;i<=10;i++){
                            document.write("<option value="+i+">"+i+"</option>");
                        }
                    </script>
                </select>個
            </td>
            <td>
                <div id = "result2">？</div>円
            </td>
        </tr>
        <tr>
            <td>合計</td>
            <td>
                <div id = "pricesum">？</div>円
            </td>
            <td>
                <select id = "amountsum">
                </select>円
            </td>
            <td>
                <div id = "resultsum">？</div>円
            </td>
        </tr>
    </tbody></table>
    <form name = "form1">
        <input type="radio" name = "taxrate" checked value="1.05">5%
        <input type="radio" name = "taxrate" value="1.08">8%
        <input type="radio" name = "taxrate" value="1.10">10%
    </form>
    <input type="button" value = "リセット" onclick="reset()">
    <input type="button" value = "計算！" onclick="calc()">
</body>
</html>
